resolver 127.0.0.11 valid=10s ipv6=off;

upstream assetra_api {
  zone assetra_api 64k;
  server api:4000 resolve;
}

upstream assetra_web {
  zone assetra_web 64k;
  server web:3000 resolve;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 10m;
  location /api/ { proxy_pass http://assetra_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
  location /docs { proxy_pass http://assetra_api/docs; }
  location / { proxy_pass http://assetra_web; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
}
