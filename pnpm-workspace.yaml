packages:
  - apps/*
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - argon2
  - esbuild
  - sharp
  - prisma
ignoredBuiltDependencies:
  - '@scarf/scarf'
  - msgpackr-extract
  - unrs-resolver
allowBuilds:
  '@prisma/client': set this to true or false
  '@prisma/engines': set this to true or false
  '@scarf/scarf': set this to true or false
  argon2: set this to true or false
  esbuild: set this to true or false
  msgpackr-extract: set this to true or false
  prisma: set this to true or false
  sharp: set this to true or false
  unrs-resolver: set this to true or false
