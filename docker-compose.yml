services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: assetra, POSTGRES_USER: assetra, POSTGRES_PASSWORD: assetra }
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U assetra"], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 5 }
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment: { MINIO_ROOT_USER: assetra, MINIO_ROOT_PASSWORD: assetra-secret }
    volumes: [minio_data:/data]
    ports: ["${MINIO_CONSOLE_PORT:-9002}:9001"]
    healthcheck: { test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"], interval: 10s, timeout: 5s, retries: 10 }
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c", "until mc alias set local http://minio:9000 assetra assetra-secret; do sleep 2; done; mc mb --ignore-existing local/assetra; mc anonymous set private local/assetra"]
  api:
    build: { context: ., dockerfile: Dockerfile.api }
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    restart: unless-stopped
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"], interval: 15s, timeout: 5s, retries: 8 }
  worker:
    build: { context: ., dockerfile: Dockerfile.worker }
    env_file: .env
    depends_on:
      redis: { condition: service_healthy }
    restart: unless-stopped
  web:
    build: { context: ., dockerfile: Dockerfile.web }
    env_file: .env
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    ports: ["${ASSETRA_HTTP_PORT:-8088}:80"]
    volumes: ["./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro", "./certs:/etc/nginx/certs:ro"]
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
    restart: unless-stopped
volumes: { postgres_data: {}, redis_data: {}, minio_data: {} }
